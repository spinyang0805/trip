<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>景點詳情｜TripMaster</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getDatabase, ref, set, get, onValue, push, update, remove }
  from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL, deleteObject }
  from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCT9AFuUGMuikwcA2wFYAbEs1gxke5i4dA",
  authDomain: "fukuoka-kyushu-oct2026.firebaseapp.com",
  databaseURL: "https://fukuoka-kyushu-oct2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "fukuoka-kyushu-oct2026",
  storageBucket: "fukuoka-kyushu-oct2026.firebasestorage.app",
  messagingSenderId: "101376635642",
  appId: "1:101376635642:web:d28651919e1df014bb4f43"
};

const app     = initializeApp(firebaseConfig);
const auth    = getAuth(app);
const db      = getDatabase(app);
const storage = getStorage(app);

const params    = new URLSearchParams(location.search);
const poiId     = params.get('id');          // null = project docs mode
const projectId = params.get('project');
const isEmbed   = params.get('embed') === '1';
if (isEmbed) document.body.classList.add('embed');

const SPOT_TYPES = {
  attraction:'🗺️ 景點', meal:'🍜 餐廳', snack:'🍡 小吃', transport:'🚗 交通',
  hotel:'🏨 住宿', ticket:'🎟️ 門票', parking:'🅿️ 停車', toll:'🛣️ 過路費',
  shopping:'🛍️ 購物', scenery:'🌸 風景', activity:'🎡 活動', gas:'⛽ 加油'
};

let currentUser = null, currentUd = null, poiData = null;
let articleTimer = null;

// ── AUTH ──────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) { location.href = 'index.html'; return; }
  currentUser = user;
  const snap = await get(ref(db, `users/${user.uid}`));
  const ud = snap.val();
  if (!ud || (ud.status !== 'approved' && !ud.isAdmin)) { location.href = 'index.html'; return; }
  currentUd = ud;

  if (projectId) {
    const projSnap = await get(ref(db, `projects/${projectId}`));
    const proj = projSnap.val();
    const isMember = proj && (ud.isAdmin || proj.ownerId === user.uid ||
      proj.members?.[user.uid]?.status === 'approved');
    if (!isMember) { document.getElementById('docs-section').style.display = 'none'; }
    else {
      document.getElementById('back-link').href = `trip.html?project=${projectId}`;
      loadDocs();
    }
  } else {
    document.getElementById('docs-section').style.display = 'none';
  }

  if (poiId) loadPoi();
  else enterDocsOnlyMode();
});

// ── DOCS-ONLY MODE (project folder) ───────────
function enterDocsOnlyMode() {
  document.getElementById('poi-section').style.display = 'none';
  document.getElementById('page-title').textContent = '📁 專案文件夾';
  if (!projectId) document.getElementById('page-title').textContent = '參數錯誤：缺少 project 或 id';
}

// ── POI ───────────────────────────────────────
function loadPoi() {
  onValue(ref(db, `pois/${poiId}`), snap => {
    poiData = snap.val();
    if (!poiData) { document.getElementById('page-title').textContent = '找不到此景點'; return; }
    document.getElementById('page-title').textContent = poiData.name || '未命名景點';
    document.getElementById('poi-name').value = poiData.name || '';
    document.getElementById('poi-category').value = poiData.category || 'attraction';
    document.getElementById('poi-address').value = poiData.address || '';
    document.getElementById('poi-links').value = (poiData.links && Object.values(poiData.links).join('\n')) || '';
    const art = document.getElementById('poi-article');
    if (document.activeElement !== art) art.value = poiData.article || '';
    document.getElementById('poi-meta').textContent =
      `被 ${poiData.usedByCount || 0} 個行程使用｜最後編輯 ${poiData.updatedAt ? new Date(poiData.updatedAt).toLocaleString('zh-TW') : '—'}`;
    const ratingEl = document.getElementById('poi-rating');
    if (poiData.rating) {
      const countStr = (poiData.userRatingsTotal || 0).toLocaleString('zh-TW');
      const updatedStr = poiData.ratingUpdatedAt ? new Date(poiData.ratingUpdatedAt).toLocaleDateString('zh-TW') : '';
      ratingEl.innerHTML = `<span style="color:var(--gold);font-weight:700">⭐ ${poiData.rating}</span>（${countStr} 則評論）` +
        (updatedStr ? ` <span style="color:var(--muted)">更新於 ${updatedStr}</span>` : '');
      ratingEl.style.display = 'block';
    } else {
      ratingEl.style.display = 'none';
    }
    const ws = document.getElementById('ws-input');
    if (ws && !ws.value) {
      ws.value = poiData.name || '';
      document.getElementById('ws-google-link').href =
        'https://www.google.com/search?q=' + encodeURIComponent(poiData.name || '');
    }
    renderPoiPhotos();
    renderMiniMap();
  });
}

window.savePoiField = function(field, value) {
  if (!poiId) return;
  const patch = { [field]: value, updatedBy: currentUser.uid, updatedAt: Date.now() };
  update(ref(db, `pois/${poiId}`), patch);
  if (field === 'name') document.getElementById('page-title').textContent = value;
};

window.savePoiLinks = function(value) {
  const links = value.split('\n').map(s => s.trim()).filter(Boolean);
  update(ref(db, `pois/${poiId}`), { links, updatedBy: currentUser.uid, updatedAt: Date.now() });
};

// ── GOOGLE PLACE LOOKUP (name → coords + rating) ─
window.searchGooglePlace = function() {
  if (!poiId) return;
  const name = document.getElementById('poi-name').value.trim();
  if (!name) return;
  if (!window.google?.maps?.places) { showToast('Google 地圖尚未載入完成'); return; }

  const service = new google.maps.places.PlacesService(document.createElement('div'));
  service.findPlaceFromQuery({ query: name, fields: ['place_id'] }, (results, status) => {
    if (status !== google.maps.places.PlacesServiceStatus.OK || !results?.length) {
      showToast('Google 找不到此名稱');
      return;
    }
    service.getDetails({
      placeId: results[0].place_id,
      fields: ['name', 'geometry', 'place_id', 'formatted_address', 'rating', 'user_ratings_total']
    }, async (place, detStatus) => {
      if (detStatus !== google.maps.places.PlacesServiceStatus.OK || !place?.geometry) {
        showToast('Google 找不到此名稱');
        return;
      }
      const lat = place.geometry.location.lat();
      const lng = place.geometry.location.lng();
      await update(ref(db, `pois/${poiId}`), {
        lat, lng,
        address: place.formatted_address || '',
        placeId: place.place_id || null,
        rating: place.rating !== undefined ? place.rating : null,
        userRatingsTotal: place.user_ratings_total !== undefined ? place.user_ratings_total : null,
        ratingUpdatedAt: Date.now(),
        updatedBy: currentUser.uid,
        updatedAt: Date.now()
      });
      showToast('已更新位置與評分 ⭐');
      if (miniMap) {
        miniMap.setCenter({ lat, lng });
        new google.maps.Marker({ position: { lat, lng }, map: miniMap });
      } else {
        if (poiData) { poiData.lat = lat; poiData.lng = lng; }
        renderMiniMap();
      }
    });
  });
};

// article: debounce autosave + keep last 10 versions
window.onArticleInput = function(value) {
  clearTimeout(articleTimer);
  document.getElementById('article-status').textContent = '輸入中…';
  articleTimer = setTimeout(async () => {
    await update(ref(db, `pois/${poiId}`), {
      article: value, updatedBy: currentUser.uid, updatedAt: Date.now()
    });
    const histRef = push(ref(db, `poisHistory/${poiId}`));
    await set(histRef, { article: value, by: currentUd?.name || currentUser.uid, ts: Date.now() });
    const histSnap = await get(ref(db, `poisHistory/${poiId}`));
    const hist = histSnap.val() || {};
    const keys = Object.keys(hist).sort();
    while (keys.length > 10) {
      await remove(ref(db, `poisHistory/${poiId}/${keys.shift()}`));
    }
    document.getElementById('article-status').textContent = '已儲存 ✓';
  }, 1200);
};

// ── POI PHOTOS (public, shared) ───────────────
function renderPoiPhotos() {
  const grid = document.getElementById('poi-photo-grid');
  const photos = poiData.photos || {};
  const entries = Object.entries(photos);
  document.getElementById('poi-photo-empty').style.display = entries.length ? 'none' : 'block';
  grid.innerHTML = entries.map(([id, p]) => {
    const canDel = p.uploadedBy === currentUser?.uid || currentUd?.isAdmin;
    return `<div class="ph-cell">
      <img src="${p.url}" loading="lazy" onclick="openLightbox('${p.url}')">
      ${canDel ? `<button class="ph-del" onclick="deletePoiPhoto('${id}')">✕</button>` : ''}
    </div>`;
  }).join('');
}

function compressImage(file, maxSide = 1600, quality = 0.8) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
      const cv = document.createElement('canvas');
      cv.width = Math.round(img.width * scale);
      cv.height = Math.round(img.height * scale);
      cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
      cv.toBlob(b => b ? resolve(b) : reject(new Error('compress failed')), 'image/jpeg', quality);
      URL.revokeObjectURL(img.src);
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

window.uploadPoiPhotos = async function(files) {
  if (!files?.length || !poiId) return;
  let done = 0;
  for (const file of files) {
    try {
      const blob = await compressImage(file);
      const phId = 'ph_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
      const path = `pois/${poiId}/${phId}.jpg`;
      await uploadBytes(sRef(storage, path), blob, { contentType: 'image/jpeg' });
      const url = await getDownloadURL(sRef(storage, path));
      await set(ref(db, `pois/${poiId}/photos/${phId}`), {
        url, storagePath: path, uploadedBy: currentUser.uid, uploadedAt: Date.now()
      });
      done++;
    } catch (e) {
      console.error(e);
      showToast(storageErrMsg(e));
      break;
    }
  }
  document.getElementById('poi-photo-file').value = '';
  if (done) showToast(`已上傳 ${done} 張照片`);
};

window.deletePoiPhoto = async function(phId) {
  const p = poiData?.photos?.[phId];
  if (!p || !confirm('刪除這張公用照片？')) return;
  try { if (p.storagePath) await deleteObject(sRef(storage, p.storagePath)); } catch (e) {}
  await remove(ref(db, `pois/${poiId}/photos/${phId}`));
};

// ── PRIVATE DOCS (project members only) ───────
let docsCache = {};
let poiNames = {};   // poiId -> name (for grouping in project folder mode)

function loadDocs() {
  onValue(ref(db, `docs/${projectId}`), snap => {
    docsCache = snap.val() || {};
    renderDocs();
  });
  if (!poiId) {
    onValue(ref(db, 'pois'), snap => {
      const pois = snap.val() || {};
      poiNames = {};
      Object.entries(pois).forEach(([id, p]) => { poiNames[id] = p.name || '未命名景點'; });
      renderDocs();
    });
  }
}

function docRowHtml(id, d) {
  const canDel = d.uploadedBy === currentUser?.uid || currentUd?.isAdmin;
  const icon = d.mime?.includes('pdf') ? '📄' : d.mime?.startsWith('image/') ? '🖼️' : '📎';
  const size = d.size > 1048576 ? (d.size/1048576).toFixed(1)+' MB' : Math.round(d.size/1024)+' KB';
  return `<div class="doc-row">
    <span class="doc-icon">${icon}</span>
    <div class="doc-info">
      <a href="${d.url}" target="_blank" class="doc-name">${escHtml(d.fileName)}</a>
      <div class="doc-meta">${size}｜${escHtml(d.uploaderName || '')}｜${new Date(d.uploadedAt).toLocaleDateString('zh-TW')}</div>
    </div>
    ${canDel ? `<button class="doc-del" onclick="deleteDoc('${id}')">🗑</button>` : ''}
  </div>`;
}

function renderDocs() {
  const list = document.getElementById('docs-list');
  const entries = Object.entries(docsCache)
    .filter(([, d]) => poiId ? d.spotPoiId === poiId : true)
    .sort((a, b) => b[1].uploadedAt - a[1].uploadedAt);
  document.getElementById('docs-empty').style.display = entries.length ? 'none' : 'block';

  if (poiId) {
    // POI detail mode: flat list, already filtered to this POI
    list.innerHTML = entries.map(([id, d]) => docRowHtml(id, d)).join('');
    return;
  }

  // Project folder mode: group by POI
  const groups = new Map();   // key: poiId or '' (project-level)
  entries.forEach(([id, d]) => {
    const key = d.spotPoiId || '';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push([id, d]);
  });

  let html = '';
  if (groups.has('')) {
    html += `<div class="doc-group-hd">📁 專案文件</div>` +
      groups.get('').map(([id, d]) => docRowHtml(id, d)).join('');
    groups.delete('');
  }
  const linkTarget = isEmbed ? ' target="_top"' : '';
  [...groups.entries()]
    .sort((a, b) => (poiNames[a[0]] || '').localeCompare(poiNames[b[0]] || '', 'zh-TW'))
    .forEach(([pid, items]) => {
      html += `<div class="doc-group-hd">📍 <a href="poi.html?id=${pid}&project=${projectId}" class="doc-group-link"${linkTarget}>${escHtml(poiNames[pid] || '未知景點')}</a></div>` +
        items.map(([id, d]) => docRowHtml(id, d)).join('');
    });
  list.innerHTML = html;
}

window.uploadDocs = async function(files) {
  if (!files?.length || !projectId) return;
  for (const file of files) {
    if (file.size > 10 * 1048576) { showToast(`「${file.name}」超過 10MB 上限`); continue; }
    try {
      const docId = 'doc_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
      const path = `projects/${projectId}/docs/${docId}_${file.name}`;
      await uploadBytes(sRef(storage, path), file, { contentType: file.type || 'application/octet-stream' });
      const url = await getDownloadURL(sRef(storage, path));
      await set(ref(db, `docs/${projectId}/${docId}`), {
        spotPoiId: poiId || null,
        fileName: file.name, url, storagePath: path,
        size: file.size, mime: file.type || '',
        uploadedBy: currentUser.uid, uploaderName: currentUd?.name || '',
        uploadedAt: Date.now()
      });
      showToast(`已上傳：${file.name} 🔒`);
    } catch (e) {
      console.error(e);
      showToast(storageErrMsg(e));
      break;
    }
  }
  document.getElementById('doc-file').value = '';
};

window.deleteDoc = async function(docId) {
  const d = docsCache[docId];
  if (!d || !confirm(`刪除「${d.fileName}」？`)) return;
  try { if (d.storagePath) await deleteObject(sRef(storage, d.storagePath)); } catch (e) {}
  await remove(ref(db, `docs/${projectId}/${docId}`));
};

// ── WEB SEARCH (embedded, Google Programmable Search) ─
// Search engines all refuse to be iframed, so in-page results use
// Google's official embeddable widget (Programmable Search Engine).
// Create one at https://programmablesearchengine.google.com (搜尋整個
// 網路), then paste its ID below.
const GOOGLE_CSE_ID = 'f3e94e017595541b6';

let cseLoaded = false;
function ensureCse() {
  if (cseLoaded || !GOOGLE_CSE_ID) return;
  cseLoaded = true;
  const s = document.createElement('script');
  s.async = true;
  s.src = 'https://cse.google.com/cse.js?cx=' + GOOGLE_CSE_ID;
  document.head.appendChild(s);
}

window.runWebSearch = function() {
  const q = document.getElementById('ws-input').value.trim();
  if (!q) return;
  document.getElementById('ws-google-link').href =
    'https://www.google.com/search?q=' + encodeURIComponent(q);
  if (!GOOGLE_CSE_ID) {
    document.getElementById('ws-hint').innerHTML =
      '內嵌搜尋尚未啟用（需設定 Google 程式化搜尋 ID）。先用右上「G ↗」開 Google 查詢，把內容複製回文章。';
    return;
  }
  ensureCse();
  document.getElementById('ws-hint').style.display = 'none';
  const tryExec = (n) => {
    const el = window.google?.search?.cse?.element?.getElement('poi-search');
    if (el) { el.execute(q); return; }
    if (n < 20) setTimeout(() => tryExec(n + 1), 300);
  };
  tryExec(0);
};

// ── MINI MAP ──────────────────────────────────
let miniMap = null;
window.initMap = function() { window.__mapsReady = true; renderMiniMap(); };

function renderMiniMap() {
  if (!window.__mapsReady || !poiData?.lat || !poiData?.lng || miniMap) return;
  const el = document.getElementById('mini-map');
  el.style.display = 'block';
  miniMap = new google.maps.Map(el, {
    center: { lat: poiData.lat, lng: poiData.lng }, zoom: 15,
    mapTypeControl: false, streetViewControl: false, fullscreenControl: false, disableDefaultUI: true
  });
  new google.maps.Marker({ position: { lat: poiData.lat, lng: poiData.lng }, map: miniMap });
  setTimeout(() => { google.maps.event.trigger(miniMap, 'resize'); miniMap.setCenter({ lat: poiData.lat, lng: poiData.lng }); }, 400);
}

// ── UTILS ─────────────────────────────────────
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
window.escHtml = escHtml;

function storageErrMsg(e) {
  return (e.code === 'storage/unknown' || e.code === 'storage/unauthorized' || e.code === 'storage/retry-limit-exceeded')
    ? '上傳失敗：Firebase Storage 尚未開通（需 Blaze 方案）'
    : '上傳失敗：' + (e.message || e);
}

window.openLightbox = function(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}
window.showToast = showToast;
</script>

<style>

  --night:#0d1117; --surface:#161b22; --surface2:#21262d;
  --border:rgba(255,255,255,0.08); --text:#e6edf3; --muted:#8b949e;
  --accent:#f78166; --gold:#d4a843;
}

.field input, .field select, .field textarea {

  color:var(--text); font-size:.82rem; padding:8px 10px; outline:none; font-family:inherit;
}
.field textarea { resize:vertical; line-height:1.7; }

.ws-row { display:flex; gap:8px; margin-bottom:10px; }
.ws-row input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:.82rem; padding:8px 10px; outline:none; font-family:inherit; }
.ws-btn { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:.78rem; padding:8px 14px; cursor:pointer; font-family:inherit; text-decoration:none; display:inline-flex; align-items:center; white-space:nowrap; }
.ws-btn:hover { background:var(--border); }
.ws-btn.ws-google { color:var(--gold); font-weight:700; }
.gcse-searchresults-only { background:#fff; border-radius:10px; }
.gcse-searchresults-only:not(:empty) { padding:6px 10px; max-height:520px; overflow-y:auto; }

.private-badge { font-size:.6rem; background:rgba(248,81,73,.15); color:#f85149; border:1px solid rgba(248,81,73,.3); border-radius:5px; padding:2px 7px; margin-left:6px; vertical-align:middle; }
.doc-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,.05); }
.doc-row:last-child { border-bottom:none; }
.doc-icon { font-size:1.2rem; }
.doc-info { flex:1; min-width:0; }
.doc-name { color:var(--text); font-size:.8rem; text-decoration:none; word-break:break-all; }
.doc-name:hover { color:var(--accent); }
.doc-meta { font-size:.62rem; color:var(--muted); margin-top:2px; }
.doc-scope { color:var(--gold); }
.doc-group-hd { font-size:.75rem; font-weight:700; color:var(--gold); margin:14px 0 4px; padding-bottom:4px; border-bottom:1px solid rgba(255,255,255,.08); }
.doc-group-hd:first-child { margin-top:0; }
.doc-group-link { color:var(--gold); text-decoration:none; }
.doc-group-link:hover { color:var(--accent); text-decoration:underline; }
.doc-del { background:none; border:none; color:var(--muted); cursor:pointer; font-size:.85rem; }
.doc-del:hover { color:#f85149; }

#lightbox { position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:600; display:none; align-items:center; justify-content:center; cursor:zoom-out; }
#lightbox.open { display:flex; }
#lightbox img { max-width:94%; max-height:94%; border-radius:8px; }

.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(50px); background:var(--surface); border:1px solid var(--border); color:var(--text); padding:9px 18px; border-radius:20px; font-size:.8rem; opacity:0; transition:transform .3s,opacity .3s; z-index:999; pointer-events:none; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

@media (max-width:600px) {
  .field input, .field select, .field textarea { font-size:.95rem; }
  h1 { font-size:1.2rem; }
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">TripMaster</a>
  <a class="nav-back" id="back-link" href="index.html">← 返回</a>
</nav>

<div class="wrap">
  <div>
    <h1 id="page-title">載入中…</h1>
    <div class="poi-meta" id="poi-meta"></div>
    <div class="poi-meta" id="poi-rating" style="display:none"></div>
  </div>

  <!-- POI SECTION -->
  <div id="poi-section" style="display:flex;flex-direction:column;gap:16px">
    <div class="card">
      <h2>📌 基本資訊（共用，所有成員可編輯）</h2>
      <div class="field-row">
        <div class="field">
          <label>名稱</label>
          <div style="display:flex;gap:6px">
            <input id="poi-name" style="flex:1" onchange="savePoiField('name', this.value)"
              onkeydown="if(event.key==='Enter'){event.preventDefault();searchGooglePlace();}">
            <button type="button" onclick="searchGooglePlace()" title="用 Google 查詢座標與評分"
              style="flex:0 0 auto;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;padding:0 12px;cursor:pointer">🔍</button>
          </div>
        </div>
        <div class="field" style="max-width:140px">
          <label>分類</label>
          <select id="poi-category" onchange="savePoiField('category', this.value)">
            <option value="attraction">🗺️ 景點</option><option value="meal">🍜 餐廳</option>
            <option value="snack">🍡 小吃</option><option value="transport">🚗 交通</option>
            <option value="hotel">🏨 住宿</option><option value="ticket">🎟️ 門票</option>
            <option value="parking">🅿️ 停車</option><option value="toll">🛣️ 過路費</option>
            <option value="shopping">🛍️ 購物</option><option value="scenery">🌸 風景</option>
            <option value="activity">🎡 活動</option><option value="gas">⛽ 加油</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>地址</label>
          <input id="poi-address" onchange="savePoiField('address', this.value)">
        </div>
      </div>
      <div class="field">
        <label>相關連結（每行一個網址）</label>
        <textarea id="poi-links" rows="2" onchange="savePoiLinks(this.value)"></textarea>
      </div>
      <div id="mini-map"></div>
    </div>

    <div class="card">
      <h2>📝 景點文章（共編）</h2>
      <div class="field">
        <textarea id="poi-article" placeholder="介紹、攻略、注意事項、推薦菜色…（自動儲存）" oninput="onArticleInput(this.value)"></textarea>
      </div>
      <div class="article-status" id="article-status"></div>
    </div>

    <div class="card">
      <h2>🔍 網頁搜尋（結果嵌在本頁，內容可直接複製貼進上方文章）</h2>
      <div class="ws-row">
        <input id="ws-input" placeholder="輸入關鍵字後按 Enter 搜尋"
          onkeydown="if(event.key==='Enter'){event.preventDefault();runWebSearch();}">
        <button class="ws-btn" onclick="runWebSearch()">搜尋</button>
        <a class="ws-btn ws-google" id="ws-google-link" href="https://www.google.com" target="_blank" title="改用 Google 開新分頁">G ↗</a>
      </div>
      <div class="gcse-searchresults-only" data-gname="poi-search" data-linkTarget="_blank"></div>
      <div class="empty-hint" id="ws-hint">搜尋結果會直接顯示在這裡（Google 提供）。</div>
    </div>

    <div class="card">
      <h2>🖼️ 公用照片（菜單、環境、風景）</h2>
      <div class="ph-grid" id="poi-photo-grid"></div>
      <div class="empty-hint" id="poi-photo-empty">尚無照片</div>
      <input type="file" id="poi-photo-file" accept="image/*" multiple style="display:none" onchange="uploadPoiPhotos(this.files)">
      <button class="upload-btn" onclick="document.getElementById('poi-photo-file').click()">⬆ 上傳照片</button>
    </div>
  </div>

  <!-- PRIVATE DOCS SECTION -->
  <div class="card" id="docs-section">
    <h2>🔒 私人文件<span class="private-badge">僅本專案成員可見</span></h2>
    <div id="docs-list"></div>
    <div class="empty-hint" id="docs-empty">尚無文件（住宿訂單、機票、預約確認信…）</div>
    <input type="file" id="doc-file" multiple style="display:none" onchange="uploadDocs(this.files)">
    <button class="upload-btn" onclick="document.getElementById('doc-file').click()">⬆ 上傳文件（≤10MB）</button>
  </div>
</div>

<div id="lightbox" onclick="this.classList.remove('open')"><img id="lightbox-img" src="" alt=""></div>
<div class="toast" id="toast"></div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC-QgKIKtZkmWIOXawmGBHVci4kKJOF7W0&callback=initMap&loading=async&libraries=places" async defer></script>
</body>
</html>
