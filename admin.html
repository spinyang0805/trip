<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台管理｜TripMaster</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getDatabase, ref, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCT9AFuUGMuikwcA2wFYAbEs1gxke5i4dA",
  authDomain: "fukuoka-kyushu-oct2026.firebaseapp.com",
  databaseURL: "https://fukuoka-kyushu-oct2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "fukuoka-kyushu-oct2026",
  storageBucket: "fukuoka-kyushu-oct2026.firebasestorage.app",
  messagingSenderId: "101376635642",
  appId: "1:101376635642:web:d28651919e1df014bb4f43"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);
const ADMIN_EMAIL = "a45436@gmail.com";

onAuthStateChanged(auth, async user => {
  if (!user) { location.href = 'index.html'; return; }
  const snap = await get(ref(db, `users/${user.uid}`));
  const userData = snap.val();
  if (!userData?.isAdmin) { location.href = 'index.html'; return; }
  document.getElementById('admin-name').textContent = userData.name;
  document.getElementById('admin-photo').src = userData.photo || '';
  initAdmin();
});

function initAdmin() {
  loadUsers();
  loadProjects();
  loadStats();
}

// ── USERS ──────────────────────────────────────
function loadUsers() {
  onValue(ref(db, 'users'), snap => {
    const data = snap.val() || {};
    renderUsers(data);
    updateStats(data);
  });
}

function renderUsers(data) {
  const pending  = document.getElementById('list-pending');
  const approved = document.getElementById('list-approved');

  const pendingUsers  = Object.entries(data).filter(([,u]) => u.status === 'pending');
  const approvedUsers = Object.entries(data).filter(([,u]) => u.status === 'approved');

  document.getElementById('badge-pending').textContent = pendingUsers.length;

  pending.innerHTML = pendingUsers.length === 0
    ? '<div class="empty-msg">目前沒有待審核帳號 ✓</div>'
    : pendingUsers.map(([uid, u]) => userCard(uid, u, 'pending')).join('');

  approved.innerHTML = approvedUsers.map(([uid, u]) => userCard(uid, u, 'approved')).join('');
}

function userCard(uid, u, status) {
  const time = u.createdAt ? new Date(u.createdAt).toLocaleDateString('zh-TW') : '';
  const isAdmin = u.isAdmin ? '<span class="badge-admin">管理員</span>' : '';
  return `
    <div class="user-card ${status === 'pending' ? 'pending' : ''}">
      <img class="u-photo" src="${u.photo||''}" onerror="this.style.display='none'" alt="">
      <div class="u-info">
        <div class="u-name">${u.name||'未知'} ${isAdmin}</div>
        <div class="u-email">${u.email||''}</div>
        <div class="u-date">申請日：${time}</div>
      </div>
      <div class="u-actions">
        ${status === 'pending' ? `
          <button class="btn-approve" onclick="approveUser('${uid}')">✓ 批准</button>
          <button class="btn-reject"  onclick="rejectUser('${uid}')">✗ 拒絕</button>
        ` : `
          ${!u.isAdmin ? `<button class="btn-revoke" onclick="revokeUser('${uid}')">撤銷</button>` : ''}
        `}
      </div>
    </div>`;
}

window.approveUser = async uid => {
  if (!confirm('確定批准此用戶？')) return;
  await update(ref(db, `users/${uid}`), { status: 'approved', approvedAt: Date.now() });
  showToast('✓ 已批准');
};
window.rejectUser = async uid => {
  if (!confirm('確定拒絕此用戶？')) return;
  await remove(ref(db, `users/${uid}`));
  showToast('已拒絕並刪除');
};
window.revokeUser = async uid => {
  if (!confirm('確定撤銷此用戶的使用權限？')) return;
  await update(ref(db, `users/${uid}`), { status: 'revoked' });
  showToast('已撤銷');
};

// ── PROJECTS ───────────────────────────────────
function loadProjects() {
  onValue(ref(db, 'projects'), snap => {
    const data = snap.val() || {};
    renderProjects(data);
  });
}

function renderProjects(data) {
  const list = document.getElementById('list-projects');
  const entries = Object.entries(data);
  document.getElementById('badge-projects').textContent = entries.length;

  list.innerHTML = entries.length === 0
    ? '<div class="empty-msg">目前沒有旅遊專案</div>'
    : entries.map(([id, p]) => `
      <div class="project-row">
        <div class="proj-emoji" style="background:${p.color||'#4a7c59'}">${p.emoji||'✈️'}</div>
        <div class="proj-info">
          <div class="proj-name">${p.title}</div>
          <div class="proj-meta">${p.ownerName||''} 建立 · ${p.startDate||'?'} ～ ${p.endDate||'?'} · ${p.memberCount||1} 人</div>
        </div>
        <div class="u-actions">
          <a href="trip.html?project=${id}" class="btn-view">查看</a>
          <button class="btn-reject" onclick="deleteProject('${id}')">刪除</button>
        </div>
      </div>`).join('');
}

window.deleteProject = async id => {
  if (!confirm('確定刪除此專案？此操作無法復原！')) return;
  await remove(ref(db, `projects/${id}`));
  showToast('已刪除專案');
};

// ── STATS ──────────────────────────────────────
function updateStats(users) {
  const vals = Object.values(users);
  document.getElementById('stat-total').textContent   = vals.length;
  document.getElementById('stat-pending').textContent = vals.filter(u => u.status === 'pending').length;
  document.getElementById('stat-active').textContent  = vals.filter(u => u.status === 'approved').length;
}

function loadStats() {
  onValue(ref(db, 'projects'), snap => {
    document.getElementById('stat-projects').textContent = Object.keys(snap.val()||{}).length;
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Tab switching
window.switchTab = (tab) => {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  document.getElementById(`panel-${tab}`).style.display = 'block';
};
</script>

<style>
:root {
  --night: #0d1117; --surface: #161b22; --surface2: #21262d;
  --border: rgba(255,255,255,0.08); --text: #e6edf3; --muted: #8b949e;
  --accent: #f78166; --gold: #d4a843; --green: #39d353; --red: #f85149;
  --r: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--night); color: var(--text); min-height: 100vh; }

nav {
  background: rgba(13,17,23,0.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border); padding: 0 24px;
  display: flex; align-items: center; height: 60px; gap: 16px; position: sticky; top: 0; z-index: 100;
}
.nav-logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; background: linear-gradient(135deg,#f78166,#d4a843); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-decoration:none; }
.nav-back { font-size: .8rem; color: var(--muted); text-decoration: none; display:flex; align-items:center; gap:4px; }
.nav-back:hover { color: var(--text); }
.nav-spacer { flex: 1; }
.user-avatar { display:flex; align-items:center; gap:8px; font-size:.8rem; color:var(--muted); }
.user-avatar img { width:30px; height:30px; border-radius:50%; }

.admin-header {
  background: linear-gradient(135deg, rgba(247,129,102,0.08), rgba(212,168,67,0.08));
  border-bottom: 1px solid var(--border);
  padding: 28px 24px;
}
.admin-header h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 4px; }
.admin-header p  { color: var(--muted); font-size: .85rem; }

.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  padding: 24px;
  max-width: 1100px;
  margin: 0 auto;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px;
  text-align: center;
}
.stat-num { font-size: 2rem; font-weight: 900; line-height: 1; margin-bottom: 6px; }
.stat-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }

.main-content { max-width: 1100px; margin: 0 auto; padding: 0 24px 60px; }

/* TABS */
.tabs {
  display: flex; gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.tab-btn {
  background: transparent; border: none; color: var(--muted);
  padding: 12px 20px; font-size: .85rem; cursor: pointer;
  font-family: inherit; border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
}
.tab-btn.active { color: var(--text); border-color: var(--accent); }
.tab-btn:hover:not(.active) { color: var(--text); }
.badge { background: var(--accent); color: #fff; border-radius: 10px; padding: 1px 6px; font-size: .65rem; margin-left: 6px; }

/* USER CARDS */
.user-card {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 18px; margin-bottom: 10px;
  transition: border-color .2s;
}
.user-card.pending { border-color: rgba(247,129,102,0.3); background: rgba(247,129,102,0.04); }
.u-photo { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; background: var(--surface2); }
.u-info { flex: 1; min-width: 0; }
.u-name  { font-size: .9rem; font-weight: 600; margin-bottom: 2px; }
.u-email { font-size: .75rem; color: var(--muted); }
.u-date  { font-size: .7rem;  color: var(--muted); margin-top: 2px; }
.u-actions { display: flex; gap: 8px; flex-shrink: 0; }

.badge-admin { background: rgba(212,168,67,0.2); color: var(--gold); border-radius: 6px; padding: 1px 7px; font-size: .65rem; margin-left: 6px; }

.btn-approve { background: rgba(57,211,83,0.15); color: var(--green); border: 1px solid rgba(57,211,83,0.3); border-radius: 7px; padding: 6px 12px; font-size: .78rem; cursor: pointer; font-family: inherit; transition: background .15s; }
.btn-approve:hover { background: rgba(57,211,83,0.25); }
.btn-reject  { background: rgba(248,81,73,0.12); color: var(--red); border: 1px solid rgba(248,81,73,0.25); border-radius: 7px; padding: 6px 12px; font-size: .78rem; cursor: pointer; font-family: inherit; transition: background .15s; }
.btn-reject:hover  { background: rgba(248,81,73,0.22); }
.btn-revoke  { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); border-radius: 7px; padding: 6px 12px; font-size: .78rem; cursor: pointer; font-family: inherit; }
.btn-view    { background: rgba(88,166,255,0.12); color: #58a6ff; border: 1px solid rgba(88,166,255,0.25); border-radius: 7px; padding: 6px 12px; font-size: .78rem; cursor: pointer; font-family: inherit; text-decoration: none; }

/* PROJECT ROWS */
.project-row {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 18px; margin-bottom: 10px;
}
.proj-emoji { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; opacity: .85; }
.proj-info { flex: 1; }
.proj-name { font-size: .9rem; font-weight: 600; }
.proj-meta { font-size: .75rem; color: var(--muted); margin-top: 3px; }

.empty-msg { text-align: center; padding: 32px; color: var(--muted); font-size: .85rem; }

.section-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 12px; font-weight: 700; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(50px); background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 20px; font-size: .82rem; opacity: 0; transition: transform .3s, opacity .3s; z-index: 999; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

@media (max-width: 600px) {
  .stats-row { grid-template-columns: 1fr 1fr; }
  .user-card { flex-wrap: wrap; }
  .u-actions { width: 100%; }
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">TripMaster</a>
  <a class="nav-back" href="index.html">← 回首頁</a>
  <div class="nav-spacer"></div>
  <div class="user-avatar">
    <img id="admin-photo" src="" alt="">
    <span id="admin-name"></span>
  </div>
</nav>

<div class="admin-header">
  <h1>⚙️ 後台管理</h1>
  <p>管理帳號審核、旅遊專案與系統設定</p>
</div>

<!-- 統計 -->
<div class="stats-row">
  <div class="stat-card">
    <div class="stat-num" id="stat-total" style="color:var(--accent)">—</div>
    <div class="stat-label">總帳號數</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="stat-pending" style="color:var(--gold)">—</div>
    <div class="stat-label">待審核</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="stat-active" style="color:var(--green)">—</div>
    <div class="stat-label">已批准</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="stat-projects" style="color:#58a6ff">—</div>
    <div class="stat-label">旅遊專案</div>
  </div>
</div>

<div class="main-content">
  <div class="tabs">
    <button class="tab-btn active" data-tab="pending" onclick="switchTab('pending')">
      待審核 <span class="badge" id="badge-pending">0</span>
    </button>
    <button class="tab-btn" data-tab="users" onclick="switchTab('users')">已批准帳號</button>
    <button class="tab-btn" data-tab="projects" onclick="switchTab('projects')">
      旅遊專案 <span class="badge" id="badge-projects" style="background:#58a6ff">0</span>
    </button>
  </div>

  <!-- 待審核 -->
  <div class="tab-panel" id="panel-pending">
    <div class="section-label">待審核帳號</div>
    <div id="list-pending"><div class="empty-msg">載入中...</div></div>
  </div>

  <!-- 已批准 -->
  <div class="tab-panel" id="panel-users" style="display:none">
    <div class="section-label">已批准帳號</div>
    <div id="list-approved"></div>
  </div>

  <!-- 專案 -->
  <div class="tab-panel" id="panel-projects" style="display:none">
    <div class="section-label">所有旅遊專案</div>
    <div id="list-projects"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
</body>
</html>
