<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>費用明細｜TripMaster</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getDatabase, ref, onValue, push, set, remove, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCT9AFuUGMuikwcA2wFYAbEs1gxke5i4dA",
  authDomain: "fukuoka-kyushu-oct2026.firebaseapp.com",
  databaseURL: "https://fukuoka-kyushu-oct2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "fukuoka-kyushu-oct2026",
  storageBucket: "fukuoka-kyushu-oct2026.firebasestorage.app",
  messagingSenderId: "101376635642",
  appId: "1:101376635642:web:d28651919e1df014bb4f43"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

const urlParams = new URLSearchParams(location.search);
const projectId = urlParams.get('project') || 'main';

let currentUser = null;
let members = [];  // [{id, name}]
let expenses = []; // all expense records

// ── CURRENCY ───────────────────────────────────
const CURRENCIES = {
  JPY:'日圓', TWD:'新台幣', USD:'美元', EUR:'歐元', KRW:'韓元', CNY:'人民幣',
  HKD:'港幣', THB:'泰銖', VND:'越南盾', GBP:'英鎊', AUD:'澳幣', SGD:'新加坡幣'
};
const CURRENCY_SYMBOLS = {
  JPY:'¥', TWD:'NT$', USD:'$', EUR:'€', KRW:'₩', CNY:'¥', HKD:'HK$',
  THB:'฿', VND:'₫', GBP:'£', AUD:'A$', SGD:'S$'
};
function symbolFor(code) { return CURRENCY_SYMBOLS[code] || (code + ' '); }

let baseCurrency = 'JPY';
let currencyRates = {}; // { CODE: { rateToTWD, updatedAt, source } }
let missingRateCount = 0;

// amount in `from` currency → amount in `to` currency, via TWD as pivot.
// returns null if either currency's rate is unknown.
function convert(amount, from, to) {
  if (from === to) return amount;
  const rf = currencyRates[from]?.rateToTWD;
  const rt = currencyRates[to]?.rateToTWD;
  if (!rf || !rt) return null;
  return amount * rf / rt;
}

// converts to the project base currency for aggregation; falls back to the
// raw amount (and counts a warning) when the rate isn't set yet.
function toBase(amount, currency) {
  if (!currency || currency === baseCurrency) return amount;
  const v = convert(amount, currency, baseCurrency);
  if (v === null) { missingRateCount++; return amount; }
  return v;
}

function loadCurrencySettings() {
  onValue(ref(db, `projects/${projectId}/baseCurrency`), snap => {
    baseCurrency = snap.val() || 'JPY';
    renderCurrencyPanel();
    renderExpenses(); renderSettlement(); renderSummary();
  });
  onValue(ref(db, `projects/${projectId}/currencyRates`), snap => {
    currencyRates = snap.val() || {};
    renderCurrencyPanel();
    renderExpenses(); renderSettlement(); renderSummary();
  });
}

onAuthStateChanged(auth, async user => {
  if (!user) { location.href = 'index.html'; return; }
  currentUser = user;
  const snap = await get(ref(db, `users/${user.uid}`));
  const ud = snap.val();
  if (!ud || (ud.status !== 'approved' && !ud.isAdmin)) { location.href = 'index.html'; return; }
  const projSnap = await get(ref(db, `projects/${projectId}`));
  const proj = projSnap.val();
  const isMember = proj && (
    ud.isAdmin ||
    proj.ownerId === user.uid ||
    proj.members?.[user.uid]?.status === 'approved'
  );
  if (!isMember) { location.href = 'index.html'; return; }
  loadProject();
  loadMembers();
  loadCurrencySettings();
  loadExpenses();
  if (urlParams.get('tab') === 'currency') switchTab('currency');
});

function loadProject() {
  onValue(ref(db, `projects/${projectId}`), snap => {
    const p = snap.val();
    if (p) document.getElementById('project-title').textContent = p.title;
  });
}

function loadMembers() {
  onValue(ref(db, `projects/${projectId}/members`), snap => {
    const data = snap.val() || {};
    members = Object.entries(data).map(([id, m]) => ({ id, name: m.name || id }));
    renderMemberSelects();
  });
}

function renderMemberSelects() {
  const paidBy = document.getElementById('exp-paidby');
  const split  = document.getElementById('split-members');
  const opts   = members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
  paidBy.innerHTML = opts;
  split.innerHTML  = members.map(m => `
    <label class="member-check">
      <input type="checkbox" value="${m.id}" checked onchange="onSplitMembersChange()"> ${m.name}
    </label>`).join('');
  populateCurrencySelect();
}

function populateCurrencySelect() {
  const sel = document.getElementById('exp-currency');
  if (!sel) return;
  const keep = sel.value;
  sel.innerHTML = Object.entries(CURRENCIES).map(([c, n]) =>
    `<option value="${c}">${c} ${n}</option>`).join('');
  sel.value = keep && CURRENCIES[keep] ? keep : baseCurrency;
}

function loadExpenses() {
  onValue(ref(db, `expenses/${projectId}`), snap => {
    const data = snap.val() || {};
    expenses = Object.entries(data).map(([id, e]) => ({ id, ...e }));
    renderExpenses();
    renderSettlement();
    renderSummary();
  });
}

// ── RENDER EXPENSES ──────────────────────────
function renderExpenses() {
  const container = document.getElementById('expense-list');
  if (expenses.length === 0) {
    container.innerHTML = `<div class="empty-msg">📝 還沒有費用紀錄，點擊「新增費用」開始記帳！</div>`;
    return;
  }

  const sorted = [...expenses].sort((a,b) => (b.date||'') > (a.date||'') ? 1 : -1);

  container.innerHTML = sorted.map(exp => {
    const payer = members.find(m => m.id === exp.paidBy)?.name || exp.paidBy || '未知';
    const currency = exp.currency || baseCurrency;
    const splitMethodLabel = { equal: '平均分攤', custom: '自訂金額', payer_only: '付款人自付' }[exp.splitMethod] || '';
    const splitNames = exp.splitMethod === 'custom' && exp.customAmounts
      ? (exp.splitWith||[]).map(id => {
          const nm = members.find(m=>m.id===id)?.name || id;
          return `${nm} ${symbolFor(currency)}${Math.round(exp.customAmounts[id]||0).toLocaleString()}`;
        }).join('、')
      : (exp.splitWith||[]).map(id => members.find(m=>m.id===id)?.name || id).join('、');
    const icon = CATEGORY_ICONS[exp.category] || '💰';
    const converted = currency !== baseCurrency ? convert(Number(exp.amount||0), currency, baseCurrency) : null;
    const convertedHtml = currency !== baseCurrency
      ? (converted !== null
          ? `<span class="exp-converted">≈ ${symbolFor(baseCurrency)}${Math.round(converted).toLocaleString()}</span>`
          : `<span class="exp-converted warn">尚未設定 ${currency} 匯率</span>`)
      : '';
    return `
      <div class="expense-card">
        <div class="exp-icon">${icon}</div>
        <div class="exp-body">
          <div class="exp-top">
            <span class="exp-title">${exp.title}</span>
            <span class="exp-amount">${symbolFor(currency)}${Number(exp.amount||0).toLocaleString()} <span class="cur-code-inline">${currency}</span></span>
          </div>
          ${convertedHtml}
          <div class="exp-meta">
            <span class="tag">${exp.category||'其他'}</span>
            <span>📅 ${exp.date||'未設日期'}</span>
            <span>💳 ${payer} 代墊</span>
            <span>👥 ${splitMethodLabel}：${splitNames}</span>
          </div>
          ${exp.note ? `<div class="exp-note">📝 ${exp.note}</div>` : ''}
        </div>
        <button class="btn-del-exp" onclick="deleteExpense('${exp.id}')">✕</button>
      </div>`;
  }).join('');
}

// ── SETTLEMENT ────────────────────────────────
function renderSettlement() {
  const container = document.getElementById('settlement-table');
  if (members.length === 0 || expenses.length === 0) {
    container.innerHTML = '<div class="empty-msg">新增費用後自動計算結算</div>';
    return;
  }

  missingRateCount = 0;

  // 計算每人淨欠額（全部換算為本位幣別）
  const balance = {};
  members.forEach(m => balance[m.id] = 0);

  expenses.forEach(exp => {
    const currency = exp.currency || baseCurrency;
    const amount = toBase(parseFloat(exp.amount) || 0, currency);
    const payer  = exp.paidBy;
    const splits = exp.splitWith || [];
    if (splits.length === 0) return;

    if (exp.splitMethod === 'custom' && exp.customAmounts) {
      splits.forEach(uid => {
        const share = toBase(parseFloat(exp.customAmounts[uid]) || 0, currency);
        if (uid !== payer) {
          balance[uid]  = (balance[uid]||0)  - share; // 欠款人
          balance[payer] = (balance[payer]||0) + share; // 代墊人
        }
      });
    } else if (exp.splitMethod !== 'payer_only') { // equal (default)
      const share = amount / splits.length;
      splits.forEach(uid => {
        if (uid !== payer) {
          balance[uid]  = (balance[uid]||0)  - share;
          balance[payer] = (balance[payer]||0) + share;
        }
      });
    }
  });

  // 計算最少轉帳次數
  const debtors  = members.filter(m => (balance[m.id]||0) < -0.5).map(m => ({ ...m, amt: balance[m.id] }));
  const creditors= members.filter(m => (balance[m.id]||0) >  0.5).map(m => ({ ...m, amt: balance[m.id] }));

  const transactions = [];
  let di = 0, ci = 0;
  const d = debtors.map(x=>({...x}));
  const c = creditors.map(x=>({...x}));

  while (di < d.length && ci < c.length) {
    const pay = Math.min(-d[di].amt, c[ci].amt);
    transactions.push({ from: d[di].name, to: c[ci].name, amount: Math.round(pay) });
    d[di].amt += pay;
    c[ci].amt -= pay;
    if (Math.abs(d[di].amt) < 0.5) di++;
    if (Math.abs(c[ci].amt) < 0.5) ci++;
  }

  // 個人總覽（全部換算為本位幣別）
  const sym = symbolFor(baseCurrency);
  const summaryRows = members.map(m => {
    const totalPaid = expenses.reduce((s, e) =>
      s + (e.paidBy === m.id ? toBase(parseFloat(e.amount)||0, e.currency||baseCurrency) : 0), 0);
    const totalOwed = expenses.reduce((s, e) => {
      if (!e.splitWith?.includes(m.id)) return s;
      const currency = e.currency || baseCurrency;
      if (e.splitMethod === 'custom' && e.customAmounts) {
        return s + toBase(parseFloat(e.customAmounts[m.id]) || 0, currency);
      }
      if (e.splitMethod !== 'payer_only') {
        return s + toBase(parseFloat(e.amount)||0, currency) / (e.splitWith.length||1);
      }
      return s;
    }, 0);
    const net = totalPaid - totalOwed;
    return `<tr>
      <td>${m.name}</td>
      <td class="num">${sym}${Math.round(totalPaid).toLocaleString()}</td>
      <td class="num">${sym}${Math.round(totalOwed).toLocaleString()}</td>
      <td class="num ${net>=0?'positive':'negative'}">${net>=0?'+':''}${sym}${Math.round(net).toLocaleString()}</td>
    </tr>`;
  }).join('');

  const txRows = transactions.length === 0
    ? '<div class="settle-done">✅ 所有費用已結清！</div>'
    : transactions.map(t => `
        <div class="tx-row">
          <span class="tx-from">${t.from}</span>
          <span class="tx-arrow">→ 付給 →</span>
          <span class="tx-to">${t.to}</span>
          <span class="tx-amount">${sym}${t.amount.toLocaleString()}</span>
        </div>`).join('');

  const warnBanner = missingRateCount > 0
    ? `<div class="rate-warn-banner">⚠️ 有費用的幣別尚未設定匯率，暫以原始數字計入計算，請至「💱 幣別設定」補上匯率</div>`
    : '';

  container.innerHTML = `
    ${warnBanner}
    <div class="settle-section">
      <div class="settle-title">📊 個人費用總覽（以 ${baseCurrency} 計算）</div>
      <table class="summary-table">
        <thead><tr><th>成員</th><th>已付款</th><th>應付款</th><th>差額</th></tr></thead>
        <tbody>${summaryRows}</tbody>
      </table>
    </div>
    <div class="settle-section">
      <div class="settle-title">💸 最終轉帳清單（以 ${baseCurrency} 計算）</div>
      ${txRows}
    </div>`;
}

function renderSummary() {
  const sym = symbolFor(baseCurrency);
  const total = expenses.reduce((s, e) => s + toBase(parseFloat(e.amount)||0, e.currency||baseCurrency), 0);
  document.getElementById('total-amount').textContent = `${sym}${Math.round(total).toLocaleString()}`;
  document.getElementById('expense-count').textContent = expenses.length;

  // 分類統計（以本位幣別計算）
  const byCategory = {};
  expenses.forEach(e => {
    const c = e.category || '其他';
    byCategory[c] = (byCategory[c]||0) + toBase(parseFloat(e.amount)||0, e.currency||baseCurrency);
  });
  const catHtml = Object.entries(byCategory)
    .sort((a,b) => b[1]-a[1])
    .map(([c, amt]) => `
      <div class="cat-row">
        <span>${CATEGORY_ICONS[c]||'💰'} ${c}</span>
        <span>${sym}${Math.round(amt).toLocaleString()}</span>
        <div class="cat-bar-bg"><div class="cat-bar" style="width:${Math.round(amt/total*100)}%"></div></div>
      </div>`).join('');
  document.getElementById('category-breakdown').innerHTML = catHtml || '<div class="empty-msg">—</div>';
}

// ── ADD EXPENSE ───────────────────────────────
window.openExpenseModal = () => {
  populateCurrencySelect();
  document.getElementById('exp-split-method').value = 'equal';
  onSplitMethodChange();
  document.getElementById('modal-expense').style.display = 'flex';
};
window.closeExpenseModal = () => {
  document.getElementById('modal-expense').style.display = 'none';
};

// ── CUSTOM SPLIT (exact amount per member) ────
window.onSplitMethodChange = function() {
  const isCustom = document.getElementById('exp-split-method').value === 'custom';
  document.getElementById('custom-amounts-group').style.display = isCustom ? 'block' : 'none';
  if (isCustom) renderCustomAmountInputs();
};

window.onSplitMembersChange = function() {
  if (document.getElementById('exp-split-method').value === 'custom') renderCustomAmountInputs();
};

window.onExpAmountChange = function() {
  if (document.getElementById('exp-split-method').value === 'custom') renderCustomAmountInputs();
};

function renderCustomAmountInputs() {
  const checked = [...document.querySelectorAll('#split-members input:checked')].map(i => i.value);
  const container = document.getElementById('custom-amounts');
  const existing = {};
  container.querySelectorAll('input').forEach(i => { existing[i.dataset.uid] = i.value; });
  const amount = parseFloat(document.getElementById('exp-amount').value) || 0;
  const currency = document.getElementById('exp-currency').value;
  const equalShare = checked.length ? (amount / checked.length) : 0;

  container.innerHTML = checked.map(uid => {
    const name = members.find(m => m.id === uid)?.name || uid;
    const val = existing[uid] !== undefined ? existing[uid] : (equalShare ? equalShare.toFixed(0) : '');
    return `<div class="custom-amt-row">
      <span class="custom-amt-name">${name}</span>
      <input type="number" data-uid="${uid}" value="${val}" oninput="updateCustomRemain()">
      <span class="custom-amt-cur">${currency}</span>
    </div>`;
  }).join('');
  updateCustomRemain();
}

window.updateCustomRemain = function() {
  const amount = parseFloat(document.getElementById('exp-amount').value) || 0;
  const inputs = [...document.querySelectorAll('#custom-amounts input')];
  const sum = inputs.reduce((s, i) => s + (parseFloat(i.value) || 0), 0);
  const diff = Math.round((amount - sum) * 100) / 100;
  const el = document.getElementById('custom-remain');
  if (Math.abs(diff) < 0.5) {
    el.textContent = '✓ 金額相符';
    el.className = 'custom-remain ok';
  } else {
    el.textContent = diff > 0 ? `尚差 ${diff.toLocaleString()}` : `超出 ${Math.abs(diff).toLocaleString()}`;
    el.className = 'custom-remain warn';
  }
};

window.addExpense = async () => {
  const title  = document.getElementById('exp-title').value.trim();
  const amount = parseFloat(document.getElementById('exp-amount').value);
  const currency = document.getElementById('exp-currency').value;
  const cat    = document.getElementById('exp-category').value;
  const date   = document.getElementById('exp-date').value;
  const paidBy = document.getElementById('exp-paidby').value;
  const method = document.getElementById('exp-split-method').value;
  const note   = document.getElementById('exp-note').value.trim();
  const splitWith = [...document.querySelectorAll('#split-members input:checked')].map(i => i.value);

  if (!title) { alert('請輸入項目名稱'); return; }
  if (isNaN(amount) || amount <= 0) { alert('請輸入正確金額'); return; }
  if (splitWith.length === 0) { alert('請至少勾選一位分攤成員'); return; }

  const record = { title, amount, currency, category: cat, date, paidBy, splitMethod: method, splitWith, note, createdAt: Date.now() };

  if (method === 'custom') {
    const customAmounts = {};
    let sum = 0;
    for (const uid of splitWith) {
      const inp = document.querySelector(`#custom-amounts input[data-uid="${uid}"]`);
      const v = parseFloat(inp?.value) || 0;
      customAmounts[uid] = v;
      sum += v;
    }
    if (Math.abs(sum - amount) >= 0.5) {
      alert(`自訂金額總和（${sum.toLocaleString()}）與總金額（${amount.toLocaleString()}）不符，請調整`);
      return;
    }
    record.customAmounts = customAmounts;
  }

  const expRef = push(ref(db, `expenses/${projectId}`));
  await set(expRef, record);

  closeExpenseModal();
  document.getElementById('exp-title').value = '';
  document.getElementById('exp-amount').value = '';
  document.getElementById('exp-note').value = '';
  document.getElementById('custom-amounts').innerHTML = '';
  showToast('已新增費用 ✓');
};

window.deleteExpense = async id => {
  if (!confirm('確定刪除此筆費用？')) return;
  await remove(ref(db, `expenses/${projectId}/${id}`));
  showToast('已刪除');
};

// ── CURRENCY PANEL ─────────────────────────────
function renderCurrencyPanel() {
  const panel = document.getElementById('currency-list');
  if (!panel) return;
  const codes = Object.keys(currencyRates);
  if (!codes.includes(baseCurrency)) codes.push(baseCurrency);
  codes.sort();

  document.getElementById('base-currency-sel').innerHTML =
    Object.entries(CURRENCIES).map(([c, n]) =>
      `<option value="${c}" ${c===baseCurrency?'selected':''}>${c} ${n}</option>`).join('');

  panel.innerHTML = codes.map(code => {
    const r = currencyRates[code];
    const isBase = code === baseCurrency;
    const updated = r?.updatedAt ? new Date(r.updatedAt).toLocaleString('zh-TW') : '尚未設定';
    return `
    <div class="cur-row">
      <span class="cur-code">${code}${isBase ? ' <span class="cur-base-tag">本位</span>' : ''}</span>
      <span class="cur-name">${CURRENCIES[code] || ''}</span>
      <span class="cur-rate-lbl">1 ${code} =</span>
      <input class="cur-rate-inp" type="number" step="0.0001" value="${r?.rateToTWD || ''}"
        onchange="setRate('${code}', parseFloat(this.value), 'manual')">
      <span class="cur-rate-lbl">TWD</span>
      <button class="cur-btn" onclick="queryRate('${code}')" title="查詢目前匯率">🔍 查詢</button>
      <span class="cur-updated">${updated}</span>
      ${!isBase ? `<button class="cur-del" onclick="deleteCurrencyRate('${code}')">🗑</button>` : ''}
    </div>`;
  }).join('');

  const unused = Object.keys(CURRENCIES).filter(c => !codes.includes(c));
  document.getElementById('add-currency-sel').innerHTML =
    unused.map(c => `<option value="${c}">${c} ${CURRENCIES[c]}</option>`).join('');
  document.getElementById('add-currency-row').style.display = unused.length ? 'flex' : 'none';
}

window.setBaseCurrency = async (code) => {
  await set(ref(db, `projects/${projectId}/baseCurrency`), code);
  showToast(`本位幣別已設為 ${code}`);
};

window.setRate = async (code, rate, source) => {
  if (isNaN(rate) || rate <= 0) { showToast('請輸入正確匯率'); renderCurrencyPanel(); return; }
  await set(ref(db, `projects/${projectId}/currencyRates/${code}`), {
    rateToTWD: rate, updatedAt: Date.now(), source
  });
  showToast(`${code} 匯率已更新 ✓`);
};

window.queryRate = async (code) => {
  showToast(`查詢 ${code} 匯率中…`);
  try {
    const res = await fetch(`https://open.er-api.com/v6/latest/${code}`);
    const data = await res.json();
    const rate = data?.rates?.TWD;
    if (!rate) throw new Error('no TWD rate in response');
    await setRate(code, rate, 'api');
  } catch (e) {
    console.error(e);
    showToast('查詢失敗，請手動輸入匯率');
  }
};

window.addCurrencyRow = async () => {
  const code = document.getElementById('add-currency-sel').value;
  if (!code) return;
  // add a stub row so it appears immediately, then try to auto-fill the rate
  await set(ref(db, `projects/${projectId}/currencyRates/${code}`), {
    rateToTWD: null, updatedAt: Date.now(), source: 'manual'
  });
  queryRate(code);
};

window.deleteCurrencyRate = async (code) => {
  if (!confirm(`刪除 ${code} 的匯率設定？`)) return;
  await remove(ref(db, `projects/${projectId}/currencyRates/${code}`));
};

const CATEGORY_ICONS = {
  '餐廳': '🍜', '小吃': '🍡', '交通': '🚗', '住宿': '🏨',
  '門票': '🎟️', '購物': '🛍️', '停車': '🅿️', '加油': '⛽',
  '景點': '🗺️', '醫藥': '💊', '其他': '💰'
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

window.switchTab = (tab) => {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  document.getElementById(`panel-${tab}`).style.display = 'block';
};
</script>

<style>
:root {
  --night:#0d1117; --surface:#161b22; --surface2:#21262d;
  --border:rgba(255,255,255,0.08); --text:#e6edf3; --muted:#8b949e;
  --accent:#f78166; --gold:#d4a843; --green:#39d353; --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--night);color:var(--text);min-height:100vh;}

nav{background:rgba(13,17,23,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:60px;gap:12px;position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.2rem;background:linear-gradient(135deg,#f78166,#d4a843);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.nav-back{font-size:.8rem;color:var(--muted);text-decoration:none;}
.nav-back:hover{color:var(--text);}
.nav-spacer{flex:1;}
#project-title{font-size:.85rem;color:var(--muted);}

.page-header{padding:24px;max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;}
.page-header h1{font-family:'Playfair Display',serif;font-size:1.6rem;}
.btn-add-exp{background:linear-gradient(135deg,#f78166,#d4a843);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.btn-add-exp:hover{opacity:.88;}

/* STATS BAR */
.stats-bar{display:flex;gap:14px;padding:0 24px 20px;max-width:1100px;margin:0 auto;flex-wrap:wrap;}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 18px;flex:1;min-width:140px;}
.stat-pill .val{font-size:1.5rem;font-weight:900;background:linear-gradient(135deg,#f78166,#d4a843);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-pill .lbl{font-size:.72rem;color:var(--muted);margin-top:2px;}

.main-content{max-width:1100px;margin:0 auto;padding:0 24px 60px;}

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.tab-btn{background:transparent;border:none;color:var(--muted);padding:10px 18px;font-size:.83rem;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
.tab-btn.active{color:var(--text);border-color:var(--accent);}

/* EXPENSE CARDS */
.expense-card{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;transition:border-color .2s;}
.expense-card:hover{border-color:rgba(247,129,102,0.25);}
.exp-icon{width:40px;height:40px;background:var(--surface2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.exp-body{flex:1;min-width:0;}
.exp-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:6px;}
.exp-title{font-size:.92rem;font-weight:600;}
.exp-amount{font-size:1rem;font-weight:900;color:var(--accent);white-space:nowrap;}
.exp-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:.72rem;color:var(--muted);}
.tag{background:var(--surface2);border-radius:5px;padding:1px 7px;}
.exp-note{font-size:.74rem;color:var(--muted);margin-top:6px;font-style:italic;}
.btn-del-exp{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:4px;flex-shrink:0;transition:color .15s;}
.btn-del-exp:hover{color:#f85149;}

/* SETTLEMENT */
.settle-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px;}
.settle-title{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:14px;}
.summary-table{width:100%;border-collapse:collapse;font-size:.83rem;}
.summary-table th{text-align:left;color:var(--muted);font-size:.72rem;padding:6px 8px;border-bottom:1px solid var(--border);}
.summary-table td{padding:8px;border-bottom:1px solid rgba(255,255,255,0.04);}
.summary-table td.num{text-align:right;font-variant-numeric:tabular-nums;}
.positive{color:var(--green);font-weight:700;}
.negative{color:#f85149;font-weight:700;}

.tx-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04);flex-wrap:wrap;}
.tx-from{font-weight:700;color:#f85149;}
.tx-arrow{color:var(--muted);font-size:.8rem;}
.tx-to{font-weight:700;color:var(--green);}
.tx-amount{margin-left:auto;font-weight:900;font-size:1rem;color:var(--gold);}
.settle-done{text-align:center;padding:20px;color:var(--green);font-size:.9rem;}

/* CATEGORY */
.cat-row{display:grid;grid-template-columns:120px 80px 1fr;align-items:center;gap:10px;margin-bottom:10px;font-size:.82rem;}
.cat-bar-bg{background:var(--surface2);border-radius:4px;height:6px;}
.cat-bar{background:linear-gradient(90deg,#f78166,#d4a843);border-radius:4px;height:6px;transition:width .4s;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(4px);}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal h2{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:.74rem;color:var(--muted);margin-bottom:5px;letter-spacing:.04em;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text);font-size:.85rem;font-family:inherit;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus{border-color:rgba(247,129,102,0.5);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.member-check{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;margin-right:10px;cursor:pointer;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.btn-primary{flex:1;background:linear-gradient(135deg,#f78166,#d4a843);color:#fff;border:none;border-radius:10px;padding:12px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-cancel{background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:.88rem;cursor:pointer;font-family:inherit;}

.form-row-flex{display:flex;gap:12px;margin-bottom:14px;}
.exp-converted{display:block;font-size:.74rem;color:var(--muted);margin-bottom:6px;}
.exp-converted.warn{color:#f85149;}
.cur-code-inline{font-size:.68rem;color:var(--muted);font-weight:400;}

.custom-amt-row{display:flex;align-items:center;gap:10px;padding:6px 0;}
.custom-amt-name{flex:1;font-size:.82rem;}
.custom-amt-row input{width:110px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:.85rem;font-family:inherit;outline:none;}
.custom-amt-cur{font-size:.72rem;color:var(--muted);width:36px;}
.custom-remain{margin-top:8px;font-size:.8rem;font-weight:700;}
.custom-remain.ok{color:var(--green);}
.custom-remain.warn{color:#f85149;}

.cur-hint{font-size:.78rem;color:var(--muted);line-height:1.7;}
.cur-list{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
.cur-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;}
.cur-code{font-weight:700;min-width:44px;}
.cur-base-tag{font-size:.62rem;background:var(--accent);color:#fff;border-radius:5px;padding:1px 6px;vertical-align:middle;}
.cur-name{font-size:.78rem;color:var(--muted);min-width:60px;}
.cur-rate-lbl{font-size:.78rem;color:var(--muted);}
.cur-rate-inp{width:100px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:.85rem;font-family:inherit;outline:none;}
.cur-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.75rem;padding:7px 12px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.cur-btn:hover{border-color:rgba(247,129,102,0.4);}
.cur-updated{font-size:.68rem;color:var(--muted);margin-left:auto;}
.cur-del{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;}
.cur-del:hover{color:#f85149;}
.cur-add-row{display:flex;gap:10px;margin-top:16px;align-items:center;}
.cur-add-row select{flex:1;max-width:220px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:.85rem;font-family:inherit;outline:none;}

.rate-warn-banner{background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.3);color:#f85149;border-radius:10px;padding:10px 14px;font-size:.78rem;margin-bottom:14px;}

.empty-msg{text-align:center;padding:36px 20px;color:var(--muted);font-size:.85rem;line-height:1.7;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(50px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:20px;font-size:.82rem;opacity:0;transition:transform .3s,opacity .3s;z-index:999;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

@media(max-width:600px){.form-grid{grid-template-columns:1fr;}.cat-row{grid-template-columns:100px 70px 1fr;}.tx-row{gap:6px;}.tx-amount{margin-left:0;width:100%;}}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">TripMaster</a>
  <a class="nav-back" href="index.html">← 回首頁</a>
  <div class="nav-spacer"></div>
  <span id="project-title"></span>
</nav>

<div class="page-header">
  <h1>💴 費用明細</h1>
  <button class="btn-add-exp" onclick="openExpenseModal()">＋ 新增費用</button>
</div>

<div class="stats-bar">
  <div class="stat-pill">
    <div class="val" id="total-amount">¥0</div>
    <div class="lbl">總花費</div>
  </div>
  <div class="stat-pill">
    <div class="val" id="expense-count">0</div>
    <div class="lbl">筆費用</div>
  </div>
</div>

<div class="main-content">
  <div class="tabs">
    <button class="tab-btn active" data-tab="list" onclick="switchTab('list')">費用清單</button>
    <button class="tab-btn" data-tab="settle" onclick="switchTab('settle')">💸 結算</button>
    <button class="tab-btn" data-tab="chart" onclick="switchTab('chart')">📊 分類統計</button>
    <button class="tab-btn" data-tab="currency" onclick="switchTab('currency')">💱 幣別設定</button>
  </div>

  <div class="tab-panel" id="panel-list">
    <div id="expense-list"><div class="empty-msg">載入中...</div></div>
  </div>

  <div class="tab-panel" id="panel-settle" style="display:none">
    <div id="settlement-table"><div class="empty-msg">載入中...</div></div>
  </div>

  <div class="tab-panel" id="panel-chart" style="display:none">
    <div class="settle-section">
      <div class="settle-title">分類費用統計</div>
      <div id="category-breakdown"></div>
    </div>
  </div>

  <div class="tab-panel" id="panel-currency" style="display:none">
    <div class="settle-section">
      <div class="settle-title">本專案幣別設定</div>
      <p class="cur-hint">此設定僅適用於本專案，不影響其他旅遊專案。匯率為「1 該幣別 = ? 新台幣」，可點「🔍 查詢」自動帶入目前匯率，或手動輸入調整。</p>

      <div class="form-group" style="max-width:280px;margin-top:14px">
        <label>本位幣別（行程與費用總計以此幣別統計）</label>
        <select id="base-currency-sel" onchange="setBaseCurrency(this.value)"></select>
      </div>

      <div id="currency-list" class="cur-list"></div>

      <div class="cur-add-row" id="add-currency-row">
        <select id="add-currency-sel"></select>
        <button class="cur-btn" onclick="addCurrencyRow()">＋ 新增幣別</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: 新增費用 -->
<div class="modal-overlay" id="modal-expense">
  <div class="modal">
    <h2>＋ 新增費用</h2>

    <div class="form-group">
      <label>項目名稱</label>
      <input id="exp-title" type="text" placeholder="例：日田まぶし千屋 晚餐">
    </div>

    <div class="form-row-flex">
      <div class="form-group" style="flex:2">
        <label>金額</label>
        <input id="exp-amount" type="number" placeholder="0" oninput="onExpAmountChange()">
      </div>
      <div class="form-group" style="flex:1">
        <label>幣別</label>
        <select id="exp-currency" onchange="onExpAmountChange()"></select>
      </div>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>日期</label>
        <input id="exp-date" type="date">
      </div>
      <div class="form-group">
        <label>分類</label>
        <select id="exp-category">
          <option value="餐廳">🍜 餐廳</option>
          <option value="小吃">🍡 小吃</option>
          <option value="交通">🚗 交通</option>
          <option value="住宿">🏨 住宿</option>
          <option value="門票">🎟️ 門票</option>
          <option value="購物">🛍️ 購物</option>
          <option value="停車">🅿️ 停車</option>
          <option value="加油">⛽ 加油</option>
          <option value="景點">🗺️ 景點</option>
          <option value="醫藥">💊 醫藥</option>
          <option value="其他">💰 其他</option>
        </select>
      </div>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>代墊人</label>
        <select id="exp-paidby"></select>
      </div>
      <div class="form-group">
        <label>分攤方式</label>
        <select id="exp-split-method" onchange="onSplitMethodChange()">
          <option value="equal">平均分攤</option>
          <option value="payer_only">付款人自付（不分攤）</option>
          <option value="custom">自訂金額</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>分攤成員（勾選參與者）</label>
      <div id="split-members"></div>
    </div>

    <div class="form-group" id="custom-amounts-group" style="display:none">
      <label>各成員自訂金額（總和需等於總金額）</label>
      <div id="custom-amounts"></div>
      <div id="custom-remain" class="custom-remain"></div>
    </div>

    <div class="form-group">
      <label>備註（選填）</label>
      <input id="exp-note" type="text" placeholder="例：含小費，爸媽代墊">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeExpenseModal()">取消</button>
      <button class="btn-primary" onclick="addExpense()">新增費用</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
document.getElementById('modal-expense').addEventListener('click', function(e) {
  if (e.target === this) closeExpenseModal();
});
// 設定預設日期為今天
document.getElementById('exp-date').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
