<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripMaster｜旅遊行程規劃平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getDatabase, ref, set, get, onValue, push, update, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCT9AFuUGMuikwcA2wFYAbEs1gxke5i4dA",
  authDomain: "fukuoka-kyushu-oct2026.firebaseapp.com",
  databaseURL: "https://fukuoka-kyushu-oct2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "fukuoka-kyushu-oct2026",
  storageBucket: "fukuoka-kyushu-oct2026.firebasestorage.app",
  messagingSenderId: "101376635642",
  appId: "1:101376635642:web:d28651919e1df014bb4f43"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);
const ADMIN_EMAIL = "a45436@gmail.com";

let currentUser = null;
let currentUserData = null;

// ── Auth state ──────────────────────────────
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    await ensureUserRecord(user);
    const snap = await get(ref(db, `users/${user.uid}`));
    currentUserData = snap.val();
    if (currentUserData?.status === 'approved' || currentUserData?.isAdmin) {
      showApp();
    } else if (currentUserData?.status === 'pending') {
      showPending();
    } else {
      showLogin();
    }
  } else {
    currentUser = null;
    currentUserData = null;
    showLogin();
  }
});

async function ensureUserRecord(user) {
  const snap = await get(ref(db, `users/${user.uid}`));
  if (!snap.exists()) {
    const isAdmin = user.email === ADMIN_EMAIL;
    await set(ref(db, `users/${user.uid}`), {
      uid: user.uid,
      name: user.displayName,
      email: user.email,
      photo: user.photoURL,
      isAdmin,
      status: isAdmin ? 'approved' : 'pending',
      createdAt: Date.now()
    });
  }
}

// ── Login / Logout ───────────────────────────
window.loginWithGoogle = async () => {
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch(e) { console.error(e); }
};

window.logout = async () => {
  await signOut(auth);
};

// ── UI states ────────────────────────────────
function showLogin() {
  document.getElementById('screen-login').style.display = 'flex';
  document.getElementById('screen-pending').style.display = 'none';
  document.getElementById('screen-app').style.display = 'none';
}
function showPending() {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-pending').style.display = 'flex';
  document.getElementById('screen-app').style.display = 'none';
}
function showApp() {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-pending').style.display = 'none';
  document.getElementById('screen-app').style.display = 'block';
  document.getElementById('user-name').textContent = currentUserData?.name || '';
  document.getElementById('user-photo').src = currentUserData?.photo || '';
  if (currentUserData?.isAdmin) {
    document.getElementById('admin-link').style.display = 'inline-flex';
  }
  loadProjects();
}

// ── Projects ─────────────────────────────────
function loadProjects() {
  onValue(ref(db, 'projects'), snap => {
    const data = snap.val() || {};
    renderProjects(data);
  });
}

function renderProjects(data) {
  const grid = document.getElementById('projects-grid');
  const myUid = currentUser.uid;
  const isAdmin = currentUserData?.isAdmin;

  const list = Object.entries(data).filter(([id, p]) => {
    return isAdmin || p.ownerId === myUid || (p.members && p.members[myUid]?.status === 'approved');
  });

  grid.innerHTML = '';

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-projects">
      <div class="empty-icon">🗺️</div>
      <p>還沒有旅遊專案<br>點擊下方按鈕建立第一個！</p>
    </div>`;
    return;
  }

  list.forEach(([id, p]) => {
    const card = document.createElement('div');
    card.className = 'project-card';
    card.innerHTML = `
      <div class="card-cover" style="background:${p.color||'#4a7c59'}">
        <span class="card-emoji">${p.emoji||'✈️'}</span>
        ${p.ownerId === myUid ? '<span class="owner-badge">建立者</span>' : ''}
      </div>
      <div class="card-body">
        <h3>${p.title}</h3>
        <p class="card-meta">📅 ${p.startDate||'未設定'} ～ ${p.endDate||''}</p>
        <p class="card-meta">👥 ${p.memberCount||1} 位成員</p>
        <p class="card-desc">${p.description||''}</p>
        <div class="card-actions">
          <a href="trip.html?project=${id}" class="btn-card-primary">開啟行程</a>
          <a href="expenses.html?project=${id}" class="btn-card-sec">💴 費用</a>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

window.openNewProjectModal = () => {
  document.getElementById('modal-new-project').style.display = 'flex';
};
window.closeNewProjectModal = () => {
  document.getElementById('modal-new-project').style.display = 'none';
};

window.createProject = async () => {
  const title = document.getElementById('np-title').value.trim();
  const desc  = document.getElementById('np-desc').value.trim();
  const start = document.getElementById('np-start').value;
  const end   = document.getElementById('np-end').value;
  const emoji = document.getElementById('np-emoji').value || '✈️';
  const color = document.getElementById('np-color').value;

  if (!title) { alert('請輸入專案名稱'); return; }

  const projRef = push(ref(db, 'projects'));
  await set(projRef, {
    title, description: desc,
    startDate: start, endDate: end,
    emoji, color,
    ownerId: currentUser.uid,
    ownerName: currentUser.displayName,
    memberCount: 1,
    members: { [currentUser.uid]: { status: 'approved', role: 'owner', name: currentUser.displayName } },
    createdAt: Date.now()
  });

  closeNewProjectModal();
  document.getElementById('np-title').value = '';
  document.getElementById('np-desc').value = '';
};
</script>

<style>
:root {
  --night: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: rgba(255,255,255,0.08);
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #f78166;
  --gold: #d4a843;
  --teal: #39d353;
  --blue: #58a6ff;
  --r: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--night);
  color: var(--text);
  min-height: 100vh;
}

/* ── SCREENS ── */
.screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── LOGIN ── */
#screen-login {
  background: var(--night);
  position: relative;
  overflow: hidden;
  flex-direction: column;
  gap: 0;
}

.login-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(196,120,58,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 80%, rgba(88,166,255,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 60% 30%, rgba(57,211,83,0.06) 0%, transparent 50%);
  pointer-events: none;
}

.login-dots {
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
}

.login-card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 52px 48px;
  text-align: center;
  max-width: 440px;
  width: 90%;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  animation: fadeUp .6s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.login-logo {
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  background: linear-gradient(135deg, #f78166, #d4a843);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}

.login-tagline {
  color: var(--muted);
  font-size: .82rem;
  margin-bottom: 36px;
  letter-spacing: .05em;
}

.features-list {
  list-style: none;
  text-align: left;
  margin-bottom: 32px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.features-list li {
  font-size: .83rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 10px;
}

.features-list li span.icon {
  width: 28px; height: 28px;
  background: var(--surface2);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem;
  flex-shrink: 0;
}

.btn-google {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  background: #fff;
  color: #1a1a1a;
  border: none;
  border-radius: 12px;
  padding: 14px 24px;
  font-size: .92rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: transform .15s, box-shadow .15s;
}
.btn-google:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,255,255,0.12); }
.btn-google img { width: 20px; }

.login-note {
  margin-top: 16px;
  font-size: .72rem;
  color: var(--muted);
}

/* ── PENDING ── */
#screen-pending {
  flex-direction: column;
  gap: 20px;
  text-align: center;
  padding: 40px;
}
#screen-pending h2 { font-size: 1.4rem; }
#screen-pending p  { color: var(--muted); font-size: .88rem; }
.btn-logout {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 20px;
  cursor: pointer;
  font-family: inherit;
  font-size: .85rem;
  transition: background .15s;
}
.btn-logout:hover { background: var(--surface); }

/* ── APP ── */
#screen-app { display: none; }

/* NAV */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,17,23,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  height: 60px;
  gap: 16px;
}

.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  background: linear-gradient(135deg, #f78166, #d4a843);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-decoration: none;
  flex-shrink: 0;
}

.nav-spacer { flex: 1; }

.nav-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: .8rem;
  color: var(--muted);
  text-decoration: none;
  padding: 6px 12px;
  border-radius: 8px;
  transition: background .15s, color .15s;
}
.nav-link:hover { background: var(--surface2); color: var(--text); }

#admin-link {
  display: none;
  background: rgba(215,168,67,0.12);
  color: var(--gold);
  border: 1px solid rgba(215,168,67,0.25);
}
#admin-link:hover { background: rgba(215,168,67,0.2); }

.user-avatar {
  display: flex; align-items: center; gap: 10px;
  font-size: .82rem; color: var(--muted);
}
.user-avatar img {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid var(--border);
}

/* HERO */
.hero {
  padding: 56px 24px 32px;
  text-align: center;
  max-width: 700px;
  margin: 0 auto;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 5vw, 3rem);
  line-height: 1.2;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--text) 40%, var(--muted));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hero p {
  color: var(--muted);
  font-size: .9rem;
  line-height: 1.7;
  margin-bottom: 28px;
}

.btn-new-project {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, #f78166, #d4a843);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 13px 28px;
  font-size: .92rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: transform .15s, opacity .15s;
  box-shadow: 0 4px 20px rgba(247,129,102,0.3);
}
.btn-new-project:hover { transform: translateY(-2px); opacity: .92; }

/* PROJECTS GRID */
.projects-section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 60px;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.section-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
}

#projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}

.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  transition: transform .2s, box-shadow .2s;
}
.project-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.4);
}

.card-cover {
  height: 110px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  opacity: .9;
}
.card-emoji { font-size: 2.8rem; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3)); }

.owner-badge {
  position: absolute; top: 10px; right: 10px;
  background: rgba(0,0,0,0.45);
  color: #fff;
  font-size: .65rem;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: .05em;
}

.card-body { padding: 18px; }
.card-body h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
.card-meta { font-size: .75rem; color: var(--muted); margin-bottom: 3px; }
.card-desc { font-size: .78rem; color: var(--muted); margin: 8px 0 14px; line-height: 1.5; }

.card-actions { display: flex; gap: 8px; }

.btn-card-primary {
  flex: 1;
  background: linear-gradient(135deg, #f78166, #d4a843);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px;
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  text-align: center;
  text-decoration: none;
  transition: opacity .15s;
}
.btn-card-primary:hover { opacity: .88; }

.btn-card-sec {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: .78rem;
  cursor: pointer;
  font-family: inherit;
  text-decoration: none;
  white-space: nowrap;
  transition: background .15s;
}
.btn-card-sec:hover { background: var(--border); }

.empty-projects {
  grid-column: 1/-1;
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-projects p { font-size: .88rem; line-height: 1.8; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  margin-bottom: 24px;
}

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: 6px; letter-spacing: .04em; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-size: .88rem;
  font-family: inherit;
  outline: none;
  transition: border-color .2s;
}
.form-group input:focus, .form-group textarea:focus { border-color: rgba(247,129,102,0.5); }
.form-group textarea { resize: vertical; min-height: 70px; }

.emoji-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}
.emoji-btn {
  width: 38px; height: 38px;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: var(--surface2);
  cursor: pointer;
  font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .15s;
}
.emoji-btn.active { border-color: var(--accent); background: rgba(247,129,102,0.12); }

.color-grid {
  display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap;
}
.color-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: border-color .15s, transform .15s;
}
.color-btn.active { border-color: #fff; transform: scale(1.15); }

.modal-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}
.btn-primary {
  flex: 1;
  background: linear-gradient(135deg, #f78166, #d4a843);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-size: .88rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: opacity .15s;
}
.btn-primary:hover { opacity: .88; }
.btn-cancel {
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 20px;
  font-size: .88rem;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s;
}
.btn-cancel:hover { background: var(--border); }

@media (max-width: 600px) {
  .login-card { padding: 36px 24px; }
  nav { padding: 0 16px; }
  .hero { padding: 36px 16px 24px; }
  .projects-section { padding: 0 16px 40px; }
  .modal-row { grid-template-columns: 1fr; }
}
</style>
</head>

    <button class="btn-logout" onclick="logout()" style="margin-left:8px">登出</button>
  </nav>

  <div class="hero">
    <h1>你的旅遊<br>一起規劃，一起出發</h1>
    <p>建立屬於你的旅遊專案，邀請家人共同編輯行程、追蹤費用、規劃路線</p>
    <button class="btn-new-project" onclick="openNewProjectModal()">＋ 建立新旅遊專案</button>
  </div>

  <div class="projects-section">
    <div class="section-header">
      <span class="section-title">我的旅遊專案</span>
    </div>
    <div id="projects-grid">
      <div class="empty-projects">
        <div class="empty-icon">⏳</div>
        <p>載入中...</p>
      </div>
    </div>
  </div>
</div>

<!-- ── MODAL: 新建專案 ── -->
<div class="modal-overlay" id="modal-new-project">
  <div class="modal">
    <h2>✈️ 建立新旅遊專案</h2>

    <div class="form-group">
      <label>專案名稱</label>
      <input id="np-title" type="text" placeholder="例：九州福岡 2026 十月">
    </div>

    <div class="form-group">
      <label>說明（選填）</label>
      <textarea id="np-desc" placeholder="這趟旅遊的主題或備忘..."></textarea>
    </div>

    <div class="modal-row">
      <div class="form-group">
        <label>出發日期</label>
        <input id="np-start" type="date">
      </div>
      <div class="form-group">
        <label>回程日期</label>
        <input id="np-end" type="date">
      </div>
    </div>

    <div class="form-group">
      <label>選擇圖示</label>
      <div class="emoji-grid" id="emoji-grid"></div>
      <input type="hidden" id="np-emoji" value="✈️">
    </div>

    <div class="form-group">
      <label>封面顏色</label>
      <div class="color-grid" id="color-grid"></div>
      <input type="hidden" id="np-color" value="#4a7c59">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeNewProjectModal()">取消</button>
      <button class="btn-primary" onclick="createProject()">建立專案</button>
    </div>
  </div>
</div>

<script>
// Emoji & Color pickers
const EMOJIS = ['✈️','🗺️','🍜','🏔️','🌸','🏖️','🚂','🛳️','🎡','🍣','🏯','🦌','🎑','🌋','🗼','🛕'];
const COLORS = ['#4a7c59','#c4783a','#2e6da4','#8e44ad','#c0392b','#16a085','#b7770d','#1a6b8a','#d35400','#27ae60'];

const emojiGrid  = document.getElementById('emoji-grid');
const colorGrid  = document.getElementById('color-grid');

EMOJIS.forEach(e => {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'emoji-btn' + (e === '✈️' ? ' active' : '');
  btn.textContent = e;
  btn.onclick = () => {
    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('np-emoji').value = e;
  };
  emojiGrid.appendChild(btn);
});

COLORS.forEach(c => {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'color-btn' + (c === '#4a7c59' ? ' active' : '');
  btn.style.background = c;
  btn.onclick = () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('np-color').value = c;
  };
  colorGrid.appendChild(btn);
});

// 點外部關閉 modal
document.getElementById('modal-new-project').addEventListener('click', function(e) {
  if (e.target === this) closeNewProjectModal();
});
</script>
</body>
</html>
